# cargo-deny configuration. https://embarkstudios.github.io/cargo-deny/
# Checked in CI via the shared rust-ci workflow.

[advisories]
# RustSec advisory database checks. Vulnerabilities fail by default;
# add reviewed advisory IDs here to ignore specific cases.
ignore = []

[licenses]
confidence-threshold = 0.9
# A permissive allow-list covering every license currently in the tree.
# cargo-deny passes a crate if its SPDX expression is satisfiable by any of these.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "CC0-1.0",
    "NCSA",
    "Unicode-3.0",
]

[bans]
# Duplicate versions only bloat the tree; warn rather than block.
multiple-versions = "warn"
# Wildcard version requirements are rejected by crates.io anyway.
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
