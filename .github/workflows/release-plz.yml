# Automated releases with release-plz.
#
# Delegates to the shared workflow in the central ecoates2/.github repo. On every
# push to main it opens/updates a Release PR and, once merged, publishes the
# crate to crates.io and creates the git tag + GitHub release.
#
# Prerequisites (one-time):
#   - Repo Settings -> Actions -> General -> Workflow permissions: enable
#     "Allow GitHub Actions to create and approve pull requests".
#   - Add the CARGO_REGISTRY_TOKEN secret (scopes: publish-new, publish-update).
#   - The crate must be published manually the first time before release-plz can
#     publish updates.
name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    uses: ecoates2/.github/.github/workflows/release-plz.yml@v1
    with:
      owner-guard: ecoates2
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
